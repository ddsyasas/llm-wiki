<?xml version="1.0" encoding="UTF-8"?>
<!--
  LLM Wiki — hero wordmark (stacked layout)
  Mirrors the first-run welcome screen (apps/web/src/components/onboarding.tsx
  WelcomeStep). Large [[ above, LLM Wiki display-sized below. Use this for
  README hero images, GitHub social preview, npm package page.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     width="800" height="400"
     role="img"
     aria-label="LLM Wiki">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .bg     { fill: #fafaf9; }
      .mark   { font: 500 90px "JetBrains Mono", Menlo, monospace; fill: #991b1b; }
      .word   { font: 600 120px Fraunces, Georgia, serif; fill: #171717; letter-spacing: -0.02em; }
      .tag    { font: 400 22px Fraunces, Georgia, serif; fill: #57534e; font-style: italic; }
      @media (prefers-color-scheme: dark) {
        .bg   { fill: #0a0a0a; }
        .mark { fill: #f87171; }
        .word { fill: #fafaf9; }
        .tag  { fill: #a8a29e; }
      }
    </style>
  </defs>
  <rect class="bg" width="800" height="400" />
  <text class="mark" x="400" y="160" text-anchor="middle">[[</text>
  <text class="word" x="400" y="280" text-anchor="middle">LLM Wiki</text>
  <text class="tag" x="400" y="330" text-anchor="middle">A personal Wikipedia an LLM maintains for you.</text>
</svg>
